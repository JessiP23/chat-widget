map $http_origin $allow_origin {
    default                            "";
    "~^https://(www\.)?wmstudio\.io$"  $http_origin;
    "~^http://localhost(:[0-9]+)?$"    $http_origin;
    "~^http://127\.0\.0\.1(:[0-9]+)?$" $http_origin;
}

# Required for proxying WebSocket upgrades
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index embed.html;

    add_header Content-Security-Policy  "frame-ancestors https://wmstudio.io https://www.wmstudio.io http://localhost:* http://127.0.0.1:*" always;
    add_header Access-Control-Allow-Origin  $allow_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

    # Handle CORS preflight
    if ($request_method = OPTIONS) {
        return 204;
    }

    # ── Proxy WebSocket connections ───────────────────────────────────────
    # Must come before the /api/v1/ block (more specific path wins)
    location /api/v1/ws/ {
        proxy_pass         https://chatbot-dashboard-h719.onrender.com;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       chatbot-dashboard-h719.onrender.com;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Proxy REST API calls ──────────────────────────────────────────────
    location /api/v1/ {
        proxy_pass         https://chatbot-dashboard-h719.onrender.com;
        proxy_http_version 1.1;
        proxy_set_header   Host              chatbot-dashboard-h719.onrender.com;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Static assets ─────────────────────────────────────────────────────
    location ~* \.(js|html)$ {
        add_header Cache-Control           "public, max-age=60";
        add_header Access-Control-Allow-Origin $allow_origin always;
        add_header Content-Security-Policy "frame-ancestors https://wmstudio.io https://www.wmstudio.io http://localhost:* http://127.0.0.1:*" always;
        try_files $uri =404;
    }

    # ── Health check for Fly.io ───────────────────────────────────────────
    location /health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
